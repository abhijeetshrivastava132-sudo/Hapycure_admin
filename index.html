<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HapyCure Admin</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    body {
      background: #f8f9fa;
      color: #111;
    }

    button,
    input {
      font-family: inherit;
    }

    .dashboard {
      display: flex;
      height: 100vh;
      background: #f8f9fa;
      overflow: hidden;
    }

    .sidebar {
      width: 112px;
      height: 100vh;
      background: #fff;
      border-right: 1px solid #eee;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .brand {
      padding: 18px 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 7px;
      border-bottom: 1px solid #f0f0f0;
      text-align: left;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      background: #7f1d1d;
      border-radius: 9px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
    }

    .brand-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1.2;
    }

    .nav {
      flex: 1;
      padding: 10px 8px;
      overflow-y: auto;
    }

    .nav-btn {
      width: 100%;
      padding: 11px 10px;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: #6b7280;
      text-align: left;
      cursor: pointer;
      margin-bottom: 6px;
      transition: 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .nav-icon {
      font-size: 18px;
      line-height: 1;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 600;
      line-height: 1.1;
      text-align: left;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: #f3f4f6;
      color: #111;
    }

    .main {
      flex: 1;
      overflow: auto;
      padding: 28px 32px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .page-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .page-subtitle {
      color: #9ca3af;
      font-size: 14px;
    }

    .api-box {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 10px;
      min-width: 260px;
    }

    .api-label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .api-input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 13px;
      outline: none;
    }

    .api-input:focus {
      border-color: #7f1d1d;
    }

    .stats-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 22px 24px;
      flex: 1;
      min-width: 150px;
    }

    .stat-label {
      font-size: 13px;
      color: #9ca3af;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #111;
      letter-spacing: -1px;
    }

    .card,
    .details-panel {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
    }

    .card {
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .requests-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .requests-table {
      flex: 1.4;
      min-width: 520px;
    }

    .details-panel {
      flex: 1;
      min-width: 340px;
      padding: 24px;
      position: sticky;
      top: 24px;
    }

    .table-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
      overflow: hidden;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #9ca3af;
      border-bottom: 1px solid #f0f0f0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 13px 14px;
      font-size: 14px;
      color: #374151;
      border-bottom: 1px solid #f9f9f9;
      white-space: nowrap;
    }

    tr:hover {
      background: #fafafa;
    }

    .strong {
      color: #111;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pending {
      background: #fff8e6;
      color: #b45309;
    }

    .approved {
      background: #f0faf4;
      color: #22863a;
    }

    .rejected {
      background: #fff0f0;
      color: #dc2626;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #eee;
      background: #fff;
      color: #111;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary,
    .btn-red {
      background: #7f1d1d;
      color: #fff;
      border: none;
    }

    .btn-primary:hover,
    .btn-red:hover {
      background: #641717;
    }

    .btn-green {
      background: #166534;
      color: #fff;
      border: none;
    }

    .details-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .details-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 4px;
      letter-spacing: -0.3px;
    }

    .details-id {
      margin: 0;
      font-size: 13px;
      color: #9ca3af;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 11px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 14px;
    }

    .info-label {
      color: #9ca3af;
      font-weight: 600;
    }

    .info-value {
      color: #111;
      font-weight: 700;
      text-align: right;
    }

    .food-box {
      margin-top: 16px;
      border-top: 1px solid #f3f4f6;
      padding-top: 14px;
    }

    .food-item {
      padding: 10px 0;
      border-bottom: 1px solid #f9f9f9;
      font-size: 14px;
    }

    .food-name {
      font-weight: 800;
      color: #111;
    }

    .food-meta {
      color: #6b7280;
      font-size: 13px;
      margin-top: 3px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .action-row button {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 800;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed #e5e7eb;
      border-radius: 14px;
      padding: 34px 20px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }

    .empty-title {
      color: #111;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .message {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      display: none;
    }

    .message.success {
      display: block;
      background: #f0faf4;
      color: #166534;
      border: 1px solid #d8f3df;
    }

    .message.error {
      display: block;
      background: #fff0f0;
      color: #dc2626;
      border: 1px solid #ffe0e0;
    }

    @media (max-width: 760px) {
      .dashboard {
        flex-direction: row;
        height: 100vh;
      }

      .sidebar {
        width: 96px;
        height: 100vh;
      }

      .brand {
        padding: 14px 8px 12px;
      }

      .brand-logo {
        width: 32px;
        height: 32px;
      }

      .brand-name {
        font-size: 11px;
      }

      .nav {
        padding: 10px 7px;
      }

      .nav-btn {
        padding: 10px 8px;
      }

      .nav-icon {
        font-size: 17px;
      }

      .nav-label {
        font-size: 10.5px;
      }

      .main {
        padding: 18px 12px;
      }

      .requests-table,
      .details-panel {
        min-width: 100%;
      }

      .details-panel {
        position: static;
      }

      table {
        min-width: 720px;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">H</div>
        <div class="brand-name">HapyCure Admin</div>
      </div>

      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="main" id="main"></main>
  </div>

  <script>
    const NAV = [
      { id: "overview", label: "Dashboard", icon: "▦" },
      { id: "requests", label: "Requests", icon: "◫" },
      { id: "approved", label: "Approved", icon: "✓" },
      { id: "rejected", label: "Rejected", icon: "×" },
      { id: "settings", label: "Settings", icon: "⚙" }
    ];

    let activePage = "overview";
    let kitchens = [];
    let selectedKitchenId = null;
    let message = "";
    let messageType = "success";

    const main = document.getElementById("main");
    const nav = document.getElementById("nav");

    function getApiUrl() {
      return (localStorage.getItem("hapycureAdminApiUrl") || "http://localhost:5000").replace(/\/$/, "");
    }

    function saveApiUrl(value) {
      localStorage.setItem("hapycureAdminApiUrl", value.replace(/\/$/, ""));
    }

    function showMessage(text, type = "success") {
      message = text;
      messageType = type;
      renderPage(false);
    }

    function statusClass(status) {
      return String(status || "Pending").toLowerCase().replaceAll(" ", "");
    }

    function badge(status) {
      return `<span class="badge ${statusClass(status)}">${status || "Pending"}</span>`;
    }

    function stat(label, value) {
      return `
        <div class="stat-card">
          <div class="stat-label">${label}</div>
          <div class="stat-value">${value}</div>
        </div>
      `;
    }

    function emptyState(title, text) {
      return `
        <div class="empty-state">
          <div class="empty-title">${title}</div>
          <div>${text}</div>
        </div>
      `;
    }

    function info(label, value) {
      return `
        <div class="info-row">
          <span class="info-label">${label}</span>
          <span class="info-value">${value || "—"}</span>
        </div>
      `;
    }

    function renderNav() {
      nav.innerHTML = NAV.map(item => `
        <button class="nav-btn ${activePage === item.id ? "active" : ""}" data-page="${item.id}">
          <span class="nav-icon">${item.icon}</span>
          <span class="nav-label">${item.label}</span>
        </button>
      `).join("");
    }

    function renderTop(title, subtitle) {
      return `
        <div class="top-row">
          <div>
            <h1 class="page-title">${title}</h1>
            <p class="page-subtitle">${subtitle}</p>
          </div>

          <div class="api-box">
            <label class="api-label">Backend URL</label>
            <input class="api-input" id="apiUrlInput" value="${getApiUrl()}" />
          </div>
        </div>

        <div class="message ${message ? messageType : ""}">${message}</div>
      `;
    }

    function requestTable(list) {
      if (list.length === 0) {
        return emptyState("No kitchens found", "Cook register karega to request yaha dikhegi.");
      }

      return `
        <div class="table-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Kitchen</th>
                  <th>Owner</th>
                  <th>City</th>
                  <th>Food Type</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody>
                ${list.map(item => `
                  <tr data-select="${item.id}" style="cursor:pointer">
                    <td class="strong">${item.id}</td>
                    <td class="strong">${item.kitchenName || "—"}</td>
                    <td>${item.owner || "—"}</td>
                    <td>${item.city || "—"}</td>
                    <td>${item.foodType || "—"}</td>
                    <td>${badge(item.status)}</td>
                    <td>View</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function detailsPanel() {
      const selected = kitchens.find(item => item.id === selectedKitchenId) || kitchens[0];

      if (!selected) {
        return emptyState("No request selected", "Kitchen request select karne par details yaha dikhegi.");
      }

      return `
        <div class="details-head">
          <div>
            <h2 class="details-title">${selected.kitchenName || "Kitchen Details"}</h2>
            <p class="details-id">${selected.id || "—"}</p>
          </div>
          ${badge(selected.status)}
        </div>

        ${info("Owner", selected.owner)}
        ${info("Phone", selected.phone)}
        ${info("Email", selected.email)}
        ${info("City", selected.city)}
        ${info("Address", selected.address)}
        ${info("Food Type", selected.foodType)}
        ${info("Opening", selected.openingTime)}
        ${info("Closing", selected.closingTime)}

        <div class="food-box">
          <div class="card-title">Food Items</div>
          ${Array.isArray(selected.foodItems) && selected.foodItems.length
            ? selected.foodItems.map(food => `
              <div class="food-item">
                <div class="food-name">${food.name || "Food Item"} - ₹${food.price || "0"}</div>
                <div class="food-meta">${food.mealType || "Meal"} • ${food.category || "Category"}</div>
              </div>
            `).join("")
            : `<div class="food-meta">No food items found.</div>`}
        </div>

        <div class="action-row">
          <button class="btn btn-green" data-approve="${selected.id}">Approve</button>
          <button class="btn btn-red" data-reject="${selected.id}">Reject</button>
        </div>
      `;
    }

    function renderOverview() {
      const pending = kitchens.filter(item => item.status === "Pending").length;
      const approved = kitchens.filter(item => item.status === "Approved").length;
      const rejected = kitchens.filter(item => item.status === "Rejected").length;

      main.innerHTML = `
        ${renderTop("Dashboard", "Backend se connected kitchen approval panel.")}

        <div class="stats-grid">
          ${stat("Total Requests", kitchens.length)}
          ${stat("Pending", pending)}
          ${stat("Approved", approved)}
          ${stat("Rejected", rejected)}
        </div>

        <div class="card">
          <div class="card-title">Latest Kitchen Requests</div>
          ${requestTable(kitchens.slice().reverse())}
        </div>
      `;
    }

    function renderRequests() {
      const pending = kitchens.filter(item => item.status === "Pending");

      main.innerHTML = `
        ${renderTop("Kitchen Requests", "Pending requests approve ya reject karo.")}

        <div class="requests-layout">
          <div class="requests-table">
            ${requestTable(pending)}
          </div>

          <div class="details-panel">
            ${detailsPanel()}
          </div>
        </div>
      `;
    }

    function renderApproved() {
      const approved = kitchens.filter(item => item.status === "Approved");

      main.innerHTML = `
        ${renderTop("Approved Kitchens", "Ye kitchens public web app me show honge.")}
        ${requestTable(approved)}
      `;
    }

    function renderRejected() {
      const rejected = kitchens.filter(item => item.status === "Rejected");

      main.innerHTML = `
        ${renderTop("Rejected Kitchens", "Rejected kitchen requests.")}
        ${requestTable(rejected)}
      `;
    }

    function renderSettings() {
      main.innerHTML = `
        ${renderTop("Settings", "Backend URL yaha set karo.")}

        <div class="card">
          <div class="card-title">Backend Connection</div>
          <p class="page-subtitle" style="margin-bottom:16px">Local test ke liye URL: http://localhost:5000</p>
          <button class="btn btn-primary" id="reloadBtn">Reload Requests</button>
        </div>
      `;
    }

    function renderPage(clearMessage = true) {
      renderNav();

      if (activePage === "overview") renderOverview();
      if (activePage === "requests") renderRequests();
      if (activePage === "approved") renderApproved();
      if (activePage === "rejected") renderRejected();
      if (activePage === "settings") renderSettings();

      const apiInput = document.getElementById("apiUrlInput");
      if (apiInput) {
        apiInput.addEventListener("change", function () {
          saveApiUrl(this.value);
          loadKitchens();
        });
      }

      if (clearMessage && message) {
        setTimeout(function () {
          message = "";
          renderPage(false);
        }, 1800);
      }
    }

    async function loadKitchens() {
      try {
        const response = await fetch(`${getApiUrl()}/api/admin/kitchen-requests`);
        const result = await response.json();

        if (!response.ok || !result.success) {
          showMessage("Backend se data load nahi hua.", "error");
          return;
        }

        kitchens = result.kitchens || [];
        if (!selectedKitchenId && kitchens.length) selectedKitchenId = kitchens[0].id;
        renderPage(false);
      } catch (error) {
        kitchens = [];
        showMessage("Backend connect nahi ho raha. Pehle backend run karo.", "error");
      }
    }

    async function approveKitchen(id) {
      try {
        const response = await fetch(`${getApiUrl()}/api/admin/kitchen-requests/${id}/approve`, {
          method: "PATCH"
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          showMessage(result.message || "Approve nahi hua.", "error");
          return;
        }

        selectedKitchenId = id;
        await loadKitchens();
        showMessage("Kitchen approved. Ab public web app me dikhega.", "success");
      } catch (error) {
        showMessage("Backend connect nahi ho raha.", "error");
      }
    }

    async function rejectKitchen(id) {
      try {
        const response = await fetch(`${getApiUrl()}/api/admin/kitchen-requests/${id}/reject`, {
          method: "PATCH"
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          showMessage(result.message || "Reject nahi hua.", "error");
          return;
        }

        selectedKitchenId = id;
        await loadKitchens();
        showMessage("Kitchen rejected.", "success");
      } catch (error) {
        showMessage("Backend connect nahi ho raha.", "error");
      }
    }

    nav.addEventListener("click", function (event) {
      const button = event.target.closest("[data-page]");
      if (!button) return;

      activePage = button.dataset.page;
      message = "";
      renderPage(false);
    });

    document.addEventListener("click", function (event) {
      const row = event.target.closest("[data-select]");
      const approveButton = event.target.closest("[data-approve]");
      const rejectButton = event.target.closest("[data-reject]");
      const reloadButton = event.target.closest("#reloadBtn");

      if (row) {
        selectedKitchenId = row.dataset.select;
        renderPage(false);
      }

      if (approveButton) approveKitchen(approveButton.dataset.approve);
      if (rejectButton) rejectKitchen(rejectButton.dataset.reject);
      if (reloadButton) loadKitchens();
    });

    renderPage(false);
    loadKitchens();
  </script>
</body>
</html>
